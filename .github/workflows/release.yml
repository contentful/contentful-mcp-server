name: release

on:
  push:
    branches: [main, 'nx-release-installation-configuration']
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  actions: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: 'Retrieve Secrets from Vault'
        id: vault
        uses: hashicorp/vault-action@v3.3.0
        with:
          url: ${{ secrets.VAULT_URL }}
          role: ${{ github.event.repository.name }}-github-action
          method: jwt
          path: github-actions
          exportEnv: false
          secrets: |
            secret/data/github/github_packages_read GITHUB_PACKAGES_READ_TOKEN | GITHUB_PACKAGES_READ_TOKEN ;
            secret/data/github/github_packages_write GITHUB_PACKAGES_WRITE_TOKEN | GITHUB_PACKAGES_WRITE_TOKEN ;

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm install
        env:
          NPM_TOKEN: ${{ steps.vault.outputs.GITHUB_PACKAGES_READ_TOKEN }}
          GITHUB_TOKEN: ${{ steps.vault.outputs.GITHUB_PACKAGES_READ_TOKEN }}

      - uses: nrwl/nx-set-shas@dbe0650947e5f2c81f59190a38512cf49126fe6b # sets NX_BASE, NX_HEAD env vars

      # - name: Test
      #   run: npx nx affected --target=test   --parallel --max-parallel=4
      - name: Build
        run: npx nx affected --target=build  --parallel --max-parallel=4
      - name: Lint
        run: npx nx affected --target=lint   --parallel --max-parallel=4

      - name: Version and Tag (main branch only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/nx-release-installation-configuration'
        run: |
          set -euox pipefail
          git config --global user.name "GitHub CI"
          git config --global user.email "github-actions@github.com"

          AFFECTED=$(npx nx show projects --affected)
          echo "Affected projects: $AFFECTED"
          npx nx release --first-release --dry-run --verbose

          git push --follow-tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish (main branch only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/nx-release-installation-configuration'
        run: |
          set -euox pipefail
          AFFECTED=$(npx nx show projects --affected)
          echo "Affected projects for publishing: $AFFECTED"
          npx nx release publish --dry-run --verbose
        env:
          GITHUB_TOKEN: ${{ steps.vault.outputs.GITHUB_PACKAGES_WRITE_TOKEN }}
